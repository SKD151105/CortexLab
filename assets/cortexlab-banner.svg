<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CortexLab Banner</title>
  <desc id="desc">CortexLab AI learning platform banner with knowledge graph and document motifs.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#060913"/>
      <stop offset="0.45" stop-color="#111827"/>
      <stop offset="0.75" stop-color="#0B3A6E"/>
      <stop offset="1" stop-color="#0E5C65"/>
    </linearGradient>

    <radialGradient id="auroraA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1210 196) rotate(126) scale(360 520)">
      <stop stop-color="#22D3EE" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="auroraB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1405 316) rotate(150) scale(300 420)">
      <stop stop-color="#14B8A6" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="pathLine" x1="980" y1="120" x2="1515" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#93C5FD"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>

    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7"/>
    </filter>

    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#E5E7EB" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="520" rx="24" fill="url(#bg)"/>
  <rect width="1600" height="520" rx="24" fill="url(#grid)"/>

  <circle cx="1210" cy="196" r="360" fill="url(#auroraA)"/>
  <circle cx="1405" cy="316" r="320" fill="url(#auroraB)"/>

  <g opacity="0.95">
    <rect x="82" y="122" width="164" height="208" rx="14" fill="url(#tile)" stroke="#BFDBFE" stroke-opacity="0.30"/>
    <rect x="99" y="152" width="130" height="10" rx="5" fill="#C7D2FE" fill-opacity="0.62"/>
    <rect x="99" y="178" width="108" height="10" rx="5" fill="#93C5FD" fill-opacity="0.52"/>
    <rect x="99" y="204" width="118" height="10" rx="5" fill="#A5F3FC" fill-opacity="0.50"/>
    <rect x="99" y="230" width="84" height="10" rx="5" fill="#99F6E4" fill-opacity="0.50"/>
  </g>

  <g opacity="0.9">
    <path d="M980 334C1040 288 1098 320 1154 254C1200 200 1240 232 1294 268C1342 300 1390 226 1448 248C1478 260 1498 292 1515 314" stroke="url(#pathLine)" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <path d="M980 334C1040 288 1098 320 1154 254C1200 200 1240 232 1294 268C1342 300 1390 226 1448 248C1478 260 1498 292 1515 314" stroke="url(#pathLine)" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.24" filter="url(#softGlow)"/>

    <g fill="#A5F3FC">
      <circle cx="980" cy="334" r="8"/>
      <circle cx="1154" cy="254" r="8"/>
      <circle cx="1294" cy="268" r="8"/>
      <circle cx="1448" cy="248" r="8"/>
      <circle cx="1515" cy="314" r="8"/>
    </g>
  </g>

  <g fill="#E2E8F0" opacity="0.82" font-family="Segoe UI, Inter, system-ui, -apple-system, sans-serif" font-size="16" letter-spacing="1.4">
    <text x="82" y="88">MERN</text>
    <text x="165" y="88">AI LEARNING</text>
    <text x="334" y="88">PDF TO STUDY FLOW</text>
    <text x="585" y="88">GEMINI</text>
  </g>

  <text x="292" y="206" fill="#F8FAFC" font-family="Poppins, Segoe UI, system-ui, sans-serif" font-weight="700" font-size="102" letter-spacing="0.4">CortexLab</text>
  <text x="294" y="264" fill="#C7D2FE" font-family="Segoe UI, Inter, system-ui, sans-serif" font-weight="400" font-size="33">Transform PDFs into interactive AI learning experiences</text>
  <text x="294" y="307" fill="#A5F3FC" font-family="Segoe UI, Inter, system-ui, sans-serif" font-weight="500" font-size="27">Flashcards • Quizzes • Summaries • Context-Aware Study Chat</text>

  <g opacity="0.85" fill="#93C5FD">
    <circle cx="1332" cy="108" r="5"/>
    <circle cx="1364" cy="108" r="5"/>
    <circle cx="1396" cy="108" r="5"/>
  </g>

  <rect x="14" y="14" width="1572" height="492" rx="18" stroke="#E2E8F0" stroke-opacity="0.16" stroke-width="1.2"/>
</svg>
